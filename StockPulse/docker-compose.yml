x-stockpulse-base: &stockpulse-base
  build:
    context: .
  env_file: .env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 15s
  restart: unless-stopped

services:
  stockpulse-a:
    <<: *stockpulse-base

  stockpulse-b:
    <<: *stockpulse-base

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:8000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      stockpulse-a:
        condition: service_healthy
      stockpulse-b:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # No host port mapping — Redis is internal only
    volumes:
      - stockpulse-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env
    # No host port mapping — DB is internal only
    volumes:
      - stockpulse-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockpulse} -d ${POSTGRES_DB:-stockpulse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  stockpulse-postgres:
  stockpulse-redis: