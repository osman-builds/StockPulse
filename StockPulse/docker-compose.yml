x-stockpulse-base: &stockpulse-base
  build:
    context: .
  environment:
    STOCKPULSE_DATABASE_URL: postgresql+psycopg://stockpulse:stockpulse@db:5432/stockpulse
    STOCKPULSE_REDIS_URL: redis://redis:6379/0
    STOCKPULSE_SECRET_KEY: stockpulse-dev-secret
    STOCKPULSE_ADMIN_CODE: stockpulse-admin-dev
    STOCKPULSE_CACHE_TTL_SECONDS: 30
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  stockpulse-a:
    <<: *stockpulse-base

  stockpulse-b:
    <<: *stockpulse-base

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:8000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - stockpulse-a
      - stockpulse-b
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - stockpulse-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stockpulse
      POSTGRES_USER: stockpulse
      POSTGRES_PASSWORD: stockpulse
    ports:
      - "5432:5432"
    volumes:
      - stockpulse-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockpulse -d stockpulse"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  stockpulse-postgres:
  stockpulse-redis: