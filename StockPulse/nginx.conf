events {
    worker_connections 1024;
}

http {
    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # --- Rate limiting zone (shared, 10 MB — handles ~160 k unique IPs) ---
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # --- Upstream with keepalive connections ---
    upstream stockpulse_backend {
        least_conn;
        server stockpulse-a:8000 max_fails=3 fail_timeout=10s;
        server stockpulse-b:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 8000;
        server_name _;

        # Reject oversized bodies early
        client_max_body_size 2m;

        # Auth endpoints — tighter rate limit
        location ~ ^/auth/(register|token|verify-otp)$ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://stockpulse_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        # All other routes — general limit
        location / {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://stockpulse_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }
    }
}
