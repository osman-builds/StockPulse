<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="StockPulse Supplier Dashboard — track product movement and replenishment signals." />
    <title>Supplier Dashboard — StockPulse</title>
    <link rel="icon" type="image/svg+xml" href="/static/stockpulse-icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:#09090b; --s1:#18181b; --s2:#27272a; --s3:#3f3f46;
            --bd:#27272a; --bd2:#3f3f46;
            --t1:#fafafa; --t2:#a1a1aa; --t3:#71717a;
            --ind:#6366f1; --ind2:#818cf8; --im:rgba(99,102,241,.1);
            --grn:#22c55e; --gmuted:rgba(34,197,94,.1);
            --amb:#f59e0b; --amuted:rgba(245,158,11,.1);
            --red:#ef4444; --rmuted:rgba(239,68,68,.1);
            --r:8px; --rl:12px;
        }
        html { font-size:14px; }
        body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--t1); min-height:100vh; -webkit-font-smoothing:antialiased; display:flex; }

        /* Sidebar */
        .sidebar { width:220px; flex-shrink:0; background:var(--s1); border-right:1px solid var(--bd); display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; }
        .sb-brand { display:flex; align-items:center; gap:10px; padding:16px 14px; border-bottom:1px solid var(--bd); }
        .sb-brand img { width:22px; height:22px; }
        .sb-brand-name { font-size:14px; font-weight:700; letter-spacing:-.02em; }
        .sb-section { padding:16px 8px 4px; font-size:10.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); }
        .sb-nav { padding:4px 8px; display:flex; flex-direction:column; gap:2px; }
        .sb-link { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:6px; text-decoration:none; color:var(--t2); font-size:13px; font-weight:500; transition:background .15s, color .15s; }
        .sb-link:hover { background:var(--s2); color:var(--t1); }
        .sb-link.active { background:var(--gmuted); color:#86efac; font-weight:600; }
        .sb-link svg { width:15px; height:15px; flex-shrink:0; }
        .sb-footer { margin-top:auto; padding:12px 10px; border-top:1px solid var(--bd); }
        .sb-user { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:var(--r); background:var(--s2); }
        .sb-avatar { width:26px; height:26px; border-radius:50%; background:var(--gmuted); border:1px solid rgba(34,197,94,.25); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .sb-avatar svg { width:13px; height:13px; color:#86efac; }
        .sb-user-info { flex:1; min-width:0; }
        .sb-user-name { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .sb-user-sub { font-size:11px; color:var(--t3); }
        .sb-logout-btn { padding:4px; border-radius:5px; background:transparent; border:none; color:var(--t3); cursor:pointer; display:flex; align-items:center; transition:color .15s; }
        .sb-logout-btn:hover { color:var(--t1); }
        .sb-logout-btn svg { width:14px; height:14px; }

        /* Main */
        .main { flex:1; min-width:0; display:flex; flex-direction:column; }
        .topbar { display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:52px; border-bottom:1px solid var(--bd); flex-shrink:0; }
        .topbar-title { font-size:14px; font-weight:600; }
        .session-label { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--t2); }
        .sdot { width:7px; height:7px; border-radius:50%; }
        .sdot-on { background:var(--grn); box-shadow:0 0 8px var(--grn); animation:blink 2s infinite; }
        .sdot-off { background:var(--t3); }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
        .content { flex:1; padding:24px; }

        /* Grid */
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:16px; }
        .span-full { grid-column:1/-1; }

        /* Card */
        .card { background:var(--s1); border:1px solid var(--bd); border-radius:var(--rl); overflow:hidden; }
        .card-head { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--bd); }
        .card-title { font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px; }
        .card-title svg { width:14px; height:14px; color:var(--t3); }
        .card-body { padding:18px; }

        /* Form */
        .fg { margin-bottom:14px; }
        .fl { display:block; font-size:12px; font-weight:500; color:var(--t2); margin-bottom:6px; }
        .fi { width:100%; padding:9px 12px; background:var(--bg); border:1px solid var(--bd2); border-radius:var(--r); color:var(--t1); font-size:13.5px; font-family:inherit; transition:border-color .15s,box-shadow .15s; outline:none; }
        .fi:focus { border-color:var(--ind); box-shadow:0 0 0 3px rgba(99,102,241,.15); }
        .fi::placeholder { color:var(--t3); }
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:9px 16px; border-radius:var(--r); font-size:13.5px; font-weight:600; font-family:inherit; border:none; cursor:pointer; transition:opacity .15s,transform .1s; }
        .btn:hover { opacity:.85; }
        .btn:active { transform:scale(.99); }
        .btn-full { width:100%; }
        .btn-primary { background:var(--ind); color:#fff; }
        .btn svg { width:14px; height:14px; }

        /* Info box */
        .info-box { padding:11px 14px; border-radius:var(--r); background:var(--s2); border:1px solid var(--bd2); font-size:12.5px; color:var(--t2); white-space:pre-wrap; line-height:1.6; }
        .info-box.code { font-family:'SF Mono','Fira Code',monospace; font-size:11.5px; }

        /* Movement item */
        .mv-item { padding:12px; border-radius:var(--r); background:var(--s2); border:1px solid var(--bd2); margin-bottom:8px; }
        .mv-item:last-child { margin-bottom:0; }
        .mv-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
        .mv-sku { font-family:monospace; font-size:11px; color:var(--ind2); font-weight:700; }
        .mv-name { font-size:13px; font-weight:600; }
        .mv-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
        .mv-stat { background:var(--s1); border:1px solid var(--bd); border-radius:6px; padding:8px; }
        .mv-stat-label { font-size:10px; font-weight:500; color:var(--t3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
        .mv-stat-value { font-size:16px; font-weight:800; color:var(--t1); }

        /* Scan history */
        .scan-item { padding:10px; border-radius:var(--r); background:var(--s2); border:1px solid var(--bd2); margin-bottom:8px; }
        .scan-item:last-child { margin-bottom:0; }
        .si-top { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
        .si-sku { font-family:monospace; font-size:11px; color:var(--ind2); font-weight:700; }
        .si-name { font-size:12.5px; font-weight:600; }
        .si-meta { font-size:11.5px; color:var(--t3); }

        /* Badges */
        .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:999px; font-size:10.5px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; }
        .badge::before { content:''; width:5px; height:5px; border-radius:50%; }
        .badge-healthy { background:var(--gmuted); color:#86efac; border:1px solid rgba(34,197,94,.2); }
        .badge-healthy::before { background:var(--grn); }
        .badge-low_stock,.badge-expiring_soon { background:var(--amuted); color:#fcd34d; border:1px solid rgba(245,158,11,.2); }
        .badge-low_stock::before,.badge-expiring_soon::before { background:var(--amb); }
        .badge-out_of_stock,.badge-expired,.badge-depleted { background:var(--rmuted); color:#fca5a5; border:1px solid rgba(239,68,68,.2); }
        .badge-out_of_stock::before,.badge-expired::before,.badge-depleted::before { background:var(--red); }

        @media(max-width:768px){ .sidebar{display:none;} .content{padding:14px;} }
    </style>
</head>
<body>
<!-- Sidebar -->
<aside class="sidebar">
    <div class="sb-brand">
        <img src="/static/stockpulse-icon.svg" alt="StockPulse" />
        <span class="sb-brand-name">StockPulse</span>
    </div>
    <div class="sb-section">Navigation</div>
    <nav class="sb-nav">
        <a href="/" class="sb-link">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
            Home
        </a>
        <a href="/dashboard" class="sb-link">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" /></svg>
            Inventory
        </a>
        <a href="/admin" class="sb-link">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" /></svg>
            Admin
        </a>
        <a href="/supplier" class="sb-link active">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 0 1-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 0 0-3.213-9.193 2.056 2.056 0 0 0-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 0 0-10.026 0 1.106 1.106 0 0 1-.987-1.106v-.958" /></svg>
            Supplier
        </a>
        <a href="/qa" class="sb-link">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" /></svg>
            QA Report
        </a>
    </nav>
    <div class="sb-footer">
        <div class="sb-user">
            <div class="sb-avatar">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 0 1-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 0 0-3.213-9.193 2.056 2.056 0 0 0-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 0 0-10.026 0 1.106 1.106 0 0 1-.987-1.106v-.958" /></svg>
            </div>
            <div class="sb-user-info">
                <div class="sb-user-name" id="sb-name">Guest</div>
                <div class="sb-user-sub" id="sb-sub">Not signed in</div>
            </div>
            <button class="sb-logout-btn" id="logout-btn" title="Sign out" style="display:none">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15" /></svg>
            </button>
        </div>
    </div>
</aside>

<!-- Main -->
<div class="main">
    <div class="topbar">
        <span class="topbar-title">Supplier Dashboard</span>
        <div class="session-label">
            <span class="sdot sdot-off" id="sdot"></span>
            <span id="stext">Not signed in</span>
        </div>
    </div>
    <div class="content">
        <div class="grid">

            <!-- Profile -->
            <div class="card">
                <div class="card-head">
                    <div class="card-title">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
                        Account profile
                    </div>
                </div>
                <div class="card-body">
                    <div class="info-box code" id="profile">Loading details...</div>
                </div>
            </div>

            <!-- Scan product -->
            <div class="card">
                <div class="card-head">
                    <div class="card-title">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 3.75 9.375v-4.5ZM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 0 1-1.125-1.125v-4.5ZM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 13.5 9.375v-4.5Z" /><path d="M6.75 6.75h.75v.75h-.75v-.75ZM6.75 17.25h.75v.75h-.75v-.75ZM16.5 6.75h.75v.75h-.75v-.75Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 16.875h3.375M13.5 14.625h.75M16.5 14.625h.75M16.5 19.125h.75M13.5 19.125h3.375" /></svg>
                        Capture scan
                    </div>
                </div>
                <div class="card-body">
                    <div class="fg">
                        <label class="fl">Camera Scanner</label>
                        <div id="interactive-scanner" style="display:none; border:1px solid var(--bd); border-radius:var(--r); overflow:hidden; margin-bottom:14px; background:#000;">
                            <div id="reader" style="width: 100%;"></div>
                        </div>
                        <button type="button" class="btn btn-ghost btn-full" id="toggle-camera-btn" style="margin-bottom:14px;">
                            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:14px;height:14px;"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z" /></svg>
                            <span>Start Camera Scan</span>
                        </button>
                    </div>
                    <div class="fg"><label class="fl">Scan code or SKU</label><input class="fi" id="scan_code" placeholder="Type or scan a code" required></div>
                    <div id="preview-container" style="display:none; margin-bottom:14px;"></div>
                    <p style="font-size:11px; color:var(--t3); margin-bottom:14px; margin-top:-8px;">
                        Try scanning/typing demo SKUs: <code style="color:var(--ind2);">EAR-WIRELESS-01</code> or <code style="color:var(--ind2);">BOTTLE-STEEL-04</code>.
                    </p>
                    <div class="fg"><label class="fl">Quantity</label><input class="fi" id="scan_qty" type="number" min="1" value="1" required></div>
                    <button class="btn btn-primary btn-full" id="scan-btn">Capture scan</button>
                </div>
            </div>

            <!-- Supplier movement (wide) -->
            <div class="card span-full">
                <div class="card-head">
                    <div class="card-title">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18 9 11.25l4.306 4.306a11.95 11.95 0 0 1 5.814-5.518l2.74-1.22m0 0-5.94-2.281m5.94 2.28-2.28 5.941" /></svg>
                        Product movement
                    </div>
                </div>
                <div class="card-body">
                    <div id="movement"><div class="info-box">Loading movement...</div></div>
                </div>
            </div>

            <!-- Recent scans -->
            <div class="card span-full">
                <div class="card-head">
                    <div class="card-title">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
                        Recent scans
                    </div>
                </div>
                <div class="card-body">
                    <div id="scans"><div class="info-box">Loading scans...</div></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const TK = "stockpulse_token";
const tok  = () => localStorage.getItem(TK) || "";
const authH = () => tok() ? { Authorization: `Bearer ${tok()}` } : {};
const esc  = v => String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");

async function api(url, opts = {}) {
    const r = await fetch(url, opts);
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.detail || "Request failed");
    return d;
}

// Global redirect if not authenticated
if (!tok()) {
    window.location.href = `/login?next=${encodeURIComponent(window.location.pathname)}`;
}

const sdot    = document.getElementById("sdot");
const stext   = document.getElementById("stext");
const sbName  = document.getElementById("sb-name");
const sbSub   = document.getElementById("sb-sub");
const logoutBtn = document.getElementById("logout-btn");

function setStatus(msg) { stext.textContent = msg; }

function renderMovement(items) {
    const el = document.getElementById("movement");
    if (!el) return;
    if (!items.length) { el.innerHTML = '<div class="info-box">No movement data available for your supplier account.</div>'; return; }
    el.innerHTML = items.map(item => `
        <div class="mv-item">
            <div class="mv-head">
                <div>
                    <span class="mv-sku">${esc(item.sku)}</span>
                    <span class="mv-name" style="margin-left:8px">${esc(item.name)}</span>
                </div>
                <span class="badge badge-${esc(item.status)}">${esc(item.status).replaceAll('_',' ')}</span>
            </div>
            <div class="mv-stats">
                <div class="mv-stat"><div class="mv-stat-label">Remaining</div><div class="mv-stat-value">${esc(item.total_remaining)}</div></div>
                <div class="mv-stat"><div class="mv-stat-label">Sold (14d)</div><div class="mv-stat-value">${esc(item.sales_last_14_days)}</div></div>
                <div class="mv-stat"><div class="mv-stat-label">Safety stock</div><div class="mv-stat-value">${esc(item.safety_stock || '—')}</div></div>
            </div>
        </div>`).join('');
}

function renderScans(items) {
    const el = document.getElementById("scans");
    if (!el) return;
    if (!items.length) { el.innerHTML = '<div class="info-box">No scans recorded yet.</div>'; return; }
    el.innerHTML = items.slice(0,10).map(s => `
        <div class="scan-item">
            <div class="si-top">
                <span class="si-sku">${esc(s.product_sku)}</span>
                <span class="si-name">${esc(s.product_name)}</span>
            </div>
            <div class="si-meta">Qty: ${esc(s.quantity)} &nbsp;·&nbsp; Remaining: ${esc(s.quantity_remaining_snapshot)} &nbsp;·&nbsp; ${esc(s.captured_at || '—')}</div>
        </div>`).join('');
}

/* ── Product preview and Camera scanner ── */
let html5QrcodeScanner = null;
const toggleCameraBtn = document.getElementById("toggle-camera-btn");
const scannerDiv = document.getElementById("interactive-scanner");
const previewContainer = document.getElementById("preview-container");
const scanCodeInput = document.getElementById("scan_code");

async function triggerPreview(code) {
    if (!previewContainer) return;
    if (!code.trim()) {
        previewContainer.style.display = "none";
        previewContainer.innerHTML = "";
        return;
    }
    try {
        const r = await api(`/scans/preview?scan_code=${encodeURIComponent(code)}`, {
            headers: authH()
        });
        
        previewContainer.style.display = "block";
        previewContainer.innerHTML = `
            <div style="background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.25); border-radius: var(--r); padding: 12px; margin-top: 14px; animation: panelFade 0.2s forwards;">
                <div style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--ind2); margin-bottom: 8px; letter-spacing: 0.04em;">Product Resolved</div>
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
                    <div>
                        <div style="font-size: 14px; font-weight: 700; color: var(--t1);">${esc(r.name)}</div>
                        <div style="font-size: 11.5px; font-family: monospace; color: var(--ind2); font-weight: 600; margin-top: 2px;">SKU: ${esc(r.sku)}</div>
                    </div>
                    <span class="badge badge-${esc(r.inventory_status_snapshot)}">${esc(r.inventory_status_snapshot).replaceAll('_',' ')}</span>
                </div>
                <div style="display: flex; gap: 16px; font-size: 12.5px; border-top: 1px solid var(--bd); padding-top: 8px;">
                    <div><span style="color: var(--t3)">Stock:</span> <strong style="color: var(--t1)">${esc(r.quantity_remaining_snapshot)}</strong></div>
                    <div><span style="color: var(--t3)">Safety:</span> <strong style="color: var(--t1)">${esc(r.safety_stock)}</strong></div>
                    <div><span style="color: var(--t3)">Category:</span> <strong style="color: var(--t1)">${esc(r.category || 'None')}</strong></div>
                </div>
            </div>
        `;
    } catch (e) {
        previewContainer.style.display = "block";
        previewContainer.innerHTML = `
            <div style="background: var(--rmuted); border: 1px solid rgba(239,68,68,0.25); border-radius: var(--r); padding: 10px 12px; margin-top: 14px; color: #fca5a5; font-size: 12.5px; animation: panelFade 0.2s forwards;">
                ⚠️ ${esc(e.message)}
            </div>
        `;
    }
}

function stopScanner() {
    if (html5QrcodeScanner) {
        html5QrcodeScanner.stop().then(() => {
            html5QrcodeScanner = null;
            if (scannerDiv) scannerDiv.style.display = "none";
            if (toggleCameraBtn) {
                toggleCameraBtn.querySelector("span").textContent = "Start Camera Scan";
                toggleCameraBtn.classList.remove("btn-primary");
                toggleCameraBtn.classList.add("btn-ghost");
            }
        }).catch(err => console.error(err));
    }
}

if (toggleCameraBtn) {
    toggleCameraBtn.addEventListener("click", () => {
        if (!html5QrcodeScanner) {
            scannerDiv.style.display = "block";
            toggleCameraBtn.querySelector("span").textContent = "Stop Camera Scan";
            toggleCameraBtn.classList.add("btn-primary");
            toggleCameraBtn.classList.remove("btn-ghost");
            
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                {
                    fps: 10,
                    qrbox: { width: 250, height: 250 }
                },
                (decodedText) => {
                    if (scanCodeInput) {
                        scanCodeInput.value = decodedText;
                        triggerPreview(decodedText);
                    }
                    stopScanner();
                },
                () => {} // silent error
            ).catch(err => {
                console.error("Camera access failed", err);
                setStatus("Camera access failed: " + err);
                stopScanner();
            });
        } else {
            stopScanner();
        }
    });
}

if (scanCodeInput) {
    let debounceTimer = null;
    scanCodeInput.addEventListener("input", (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            triggerPreview(e.target.value);
        }, 400);
    });
}

document.getElementById("scan-btn").addEventListener("click", async () => {
    try {
        const r = await api("/scans", {
            method:"POST", headers:{"Content-Type":"application/json", ...authH()},
            body: JSON.stringify({ scan_code: document.getElementById("scan_code").value, quantity: Number(document.getElementById("scan_qty").value || 1) }),
        });
        setStatus(r.message || "Scan captured.");
        
        // Reset preview container and input
        if (scanCodeInput) scanCodeInput.value = "";
        if (previewContainer) {
            previewContainer.style.display = "none";
            previewContainer.innerHTML = "";
        }
        
        refresh();
    } catch(e) { setStatus(e.message); }
});

logoutBtn.addEventListener("click", () => { localStorage.removeItem(TK); window.location.href = "/login"; });

async function refresh() {
    const t = tok();
    if (!t) return; // Will redirect

    try {
        const me = await api("/auth/me", { headers: authH() });
        sdot.className = "sdot sdot-on";
        setStatus(`${me.username} · ${me.role}`);
        sbName.textContent = me.username;
        sbSub.textContent  = me.role + (me.is_verified ? " · verified" : " · unverified");
        logoutBtn.style.display = "flex";
        document.getElementById("profile").textContent = JSON.stringify(me, null, 2);

        if (me.role === "supplier") {
            const [movement, scans] = await Promise.all([
                api("/supplier/movement", { headers: authH() }),
                api("/scans/me",          { headers: authH() }),
            ]);
            renderMovement(movement.items || []);
            renderScans(scans.items || []);
        } else {
            document.getElementById("movement").innerHTML = '<div class="info-box">Supplier role required to view movement data.</div>';
        }
    } catch(e) {
        localStorage.removeItem(TK);
        window.location.href = `/login?next=${encodeURIComponent(window.location.pathname)}`;
    }
}

refresh();
</script>
</body>
</html>
