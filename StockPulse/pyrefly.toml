# Pyrefly type-checker configuration
# https://pyrefly.org/en/docs/configuration/
#
# Points Pyrefly at the project's local virtual environment

python_interpreter = ".venv\\Scripts\\python.exe"

site_package_path = [
    ".venv\\Lib\\site-packages"
]

source_directories = ["."]

# Exclude generated / cache directories
exclude = [
    "__pycache__",
    ".git",
    "**/__pycache__/**",
    "**/*.pyc",
    ".venv"
]
